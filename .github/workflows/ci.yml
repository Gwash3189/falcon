name: CI

on:
  pull_request:

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: falcon
          POSTGRES_PASSWORD: falcon
          POSTGRES_DB: falcon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter @falcon/server db:migrate
        env:
          DATABASE_URL: postgresql://falcon:falcon@localhost:5432/falcon_test
          VALKEY_URL: redis://localhost:6379
          BOOTSTRAP_ADMIN_KEY: ci-bootstrap-key

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://falcon:falcon@localhost:5432/falcon_test
          VALKEY_URL: redis://localhost:6379
          BOOTSTRAP_ADMIN_KEY: ci-bootstrap-key
