services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: falcon_dev
      POSTGRES_USER: falcon
      POSTGRES_PASSWORD: falcon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"

volumes:
  postgres_data:
